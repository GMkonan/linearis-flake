name: Update linearis

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-linearis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install nix-update
        run: nix profile install github:Mic92/nix-update

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update package
        run: |
          nix-update linearis --flake

      - name: Refresh lockSrc hash
        run: |
          VERSION=$(sed -n 's/^[[:space:]]*version = "\(.*\)";/\1/p' package.nix | head -1)
          LOCK_HASH=$(nix-prefetch-url --unpack --type sha256 "https://github.com/czottmann/linearis/archive/refs/tags/v${VERSION}.tar.gz")
          LOCK_HASH_SRI=$(nix hash to-sri --type sha256 "$LOCK_HASH")
          sed -i '/lockSrc = fetchFromGitHub {/,/};/ s|hash = ".*";|hash = "'"$LOCK_HASH_SRI"'";|' package.nix

      - name: Build package
        run: |
          nix build .#linearis -L

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No updates"
            exit 0
          fi

          VERSION=$(grep -o 'version = "[^"]*"' package.nix | head -1 | sed 's/version = "\(.*\)"/\1/')
          git add package.nix
          git commit -m "Update linearis to ${VERSION}"
          git push
